<!DOCTYPE html>
<html lang="en">

<body>
    <input type="text" onkeydown="down();" onkeyup="up()">
    <div id="demo">sfsdf</div>
</body>
<script>
    function down(){
        document.getElementById("demo").innerHTML=  "key pressed";
    }
    function up(){
        document.getElementById("demo").innerHTML=  "key released" ;
    }
</script>
</html>
