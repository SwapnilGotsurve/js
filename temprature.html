<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" id="myForm">
        °C <input type="number" id="cel">
        <button>°C convert °F </button>
        <!-- °F <input type="number" id="far"> -->
       <p id="result"></p>
    </form>
</body>
<script>
    document.getElementById("myForm").addEventListener("submit", function(e) {
        e.preventDefault(); 
        
        let cel= document.getElementById('cel').value ;
        // let far= document.getElementById('cel').style.display = 'none'

        res = (cel * 9/5) + 32 ;
        document.getElementById('result').innerHTML = `  °F = ${res}`;
    //  °F = (°C × 9/5) + 32.
    })
</script>
</html>
