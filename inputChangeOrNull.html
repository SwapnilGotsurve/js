<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Debug Input</title>
</head>
<body>

    <form >
        <input type="text" id="inp" onchange="fun(this)">
        <!-- <input type="submit" value="Submit"> -->
    </form>

    <div id="demo"></div>

<script>
    function fun(ele) {
        // let val = document.getElementById("inp").value;

        if (ele.value != "") {
            document.getElementById("demo").innerHTML = "input changed";
        } else {
            document.getElementById("demo").innerHTML = "input empty";
        }
    }
</script>

</body>
</html>
